---
# MAY BE MOVED/DELETED AFTER https://github.com/cloudnative-pg/charts/pull/838
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: cnpg-backups
  namespace: cnpg-system
spec:
  retentionPolicy: "30d"
  configuration:
    destinationPath: s3://cnpg-backups/cluster
    endpointURL: https://s3.fuochi.top
    s3Credentials:
      accessKeyId:
        name: garage-cnpg-creds
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: garage-cnpg-creds
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
      maxParallel: 1
    data:
      compression: gzip
      jobs: 1
      immediateCheckpoint: false
  # Because of https://github.com/cloudnative-pg/plugin-barman-cloud/pull/398
  # Required for Garage <= 1.0.1 (and several other S3-compatibles):
  # boto3 ≥ Jan 2025 defaults to streaming SHA256/CRC32 checksums,
  # which Garage cannot parse (treats "STREAMING-AWS4-..." as hex).
  # Track: https://git.deuxfleurs.fr/Deuxfleurs/garage/issues/824
  # Remove once Garage supports STREAMING-UNSIGNED-PAYLOAD-TRAILER.
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
