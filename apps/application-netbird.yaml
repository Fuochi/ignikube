---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbird
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: netbird
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - FailOnSharedResource=true
  sources:
    - repoURL: ghcr.io/netbirdio/helm-charts
      chart: netbird-operator
      targetRevision: 0.7.0
      helm:
        releaseName: netbird-operator
        valuesObject:
          netbirdAPI:
            keyFromSecret:
              name: 'mgmt-api-key'
              key: 'NB_API_KEY'
          operator:
            resources:
              requests:
                cpu: 4m
                memory: 32Mi
              limits:
                memory: 32Mi
          # renovate: datasource=docker packageName=netbirdio/netbird
          routingClientImage: netbirdio/netbird:v0.74.0-rootless

    - repoURL: https://github.com/Fuochi/ignikube.git
      targetRevision: main
      path: apps/netbird
