---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-state-metrics
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - FailOnSharedResource=true
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-state-metrics
      targetRevision: 7.4.1
      helm:
        releaseName: kube-state-metrics
        valuesObject:
          collectors:
            - daemonsets
            - deployments
            - namespaces
            - nodes
            - pods
            - replicasets
            - statefulsets
          metricAllowlist:
            - kube_daemonset_status_(desired|ready)_number_scheduled
            - kube_deployment_(status_replicas|spec_replicas)
            - kube_namespace_status_phase
            - kube_node_info
            - kube_pod_info
            - kube_pod_status_phase
            - kube_pod_container_status_restarts_total
            - kube_pod_container_resource_(requests|limits)
            - kube_replicaset_owner
            - kube_statefulset_(status_replicas|replicas)
          prometheus:
            monitor:
              enabled: true
              http:
                honorLabels: true
                metricRelabelings:
                  # Swap exported_namespace back to namespace if honorLabels didn't work
                  - sourceLabels: [exported_namespace]
                    targetLabel: namespace
                    regex: (.+)
                    action: replace
                  - sourceLabels: [exported_pod]
                    targetLabel: pod
                    regex: (.+)
                    action: replace
                  - regex: exported_(namespace|pod)
                    action: labeldrop
              metrics:
                honorLabels: true
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 48Mi
