---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opentelemetry-collector-role
rules:
  - apiGroups: ['']
    resources:
      - nodes/stats
      - nodes/proxy
    verbs: ['get']
  - apiGroups: ['']
    resources:
      - nodes
      - pods
      - namespaces
      - endpoints
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources:
      - replicasets
    verbs: ['get', 'list', 'watch']
