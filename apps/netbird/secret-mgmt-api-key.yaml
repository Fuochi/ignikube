---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mgmt-api-key
  namespace: netbird
spec:
  refreshInterval: 1h0m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless

  target:
    name: mgmt-api-key
    creationPolicy: Owner

  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: /netbird-mgmt-api-key
        metadataPolicy: None
