---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-exporter
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - FailOnSharedResource=true
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-node-exporter
      targetRevision: 4.55.0
      helm:
        releaseName: node-exporter
        valuesObject:
          extraArgs:
            - --collector.disable-defaults
            - --collector.cpu
            - --collector.loadavg
            - --collector.meminfo
            - --collector.filesystem
            - --collector.netdev
            - --collector.uname
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/containerd|var/lib/kubelet)($|/)
          prometheus:
            monitor:
              enabled: true
              metricRelabelings:
                - sourceLabels: [__name__]
                  regex: 'node_(cpu_seconds_total|load1|load5|load15|memory_MemTotal_bytes|memory_MemAvailable_bytes|memory_Buffers_bytes|memory_Cached_bytes|filesystem_size_bytes|filesystem_avail_bytes|network_receive_bytes_total|network_transmit_bytes_total|uname_info)'
                  action: keep
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 32Mi
