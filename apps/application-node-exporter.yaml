---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-exporter
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - FailOnSharedResource=true
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-node-exporter
      targetRevision: 4.55.0
      helm:
        releaseName: node-exporter
        valuesObject:
          extraArgs:
            - --collector.disable-defaults
            - --collector.cpu
            - --collector.loadavg
            - --collector.meminfo
            - --collector.uname
          prometheus:
            monitor:
              enabled: true
              metricRelabelings:
                # Drop unwanted CPU modes first (nice, irq, softirq, steal)
                - sourceLabels: [__name__, mode]
                  regex: 'node_cpu_seconds_total;(nice|irq|softirq|steal)'
                  action: drop
                # Then keep only our desired metrics
                - sourceLabels: [__name__]
                  regex: 'node_(cpu_seconds_total|load1|memory_MemTotal_bytes|memory_MemAvailable_bytes|uname_info)'
                  action: keep
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 32Mi
